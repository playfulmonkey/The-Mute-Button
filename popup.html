<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui;
      background: #1a1a2e;
      color: white;
    }
    h2 { margin: 0 0 16px; font-size: 18px; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    label { font-size: 14px; }
    select {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      border-radius: 6px;
      border: none;
      background: #16213e;
      color: white;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      border: none;
      background: #4f46e5;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
    .status {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
      text-align: center;
    }
    input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }
  </style>
</head>
<body>
  <h2>The Mute Button</h2>

  <div class="row">
    <label>Enable Filter</label>
    <input type="checkbox" id="enableToggle" checked />
  </div>

  <label>Filter Mode:</label>
  <select id="filterMode">
    <option value="blur">Blur Content</option>
    <option value="replace">Replace with Warning</option>
    <option value="hide">Hide Completely</option>
  </select>

  <button id="scanBtn">Scan This Page</button>
  <p class="status" id="status">Mute Button is active.</p>

  <script src="popup.js"></script>
</body>
</html>
